name: build

# Empaqueta pdf2md en los tres sistemas con PyInstaller (modo onedir).
# - Tag v*      -> construye y publica un GitHub Release con los 3 artefactos.
# - Manual      -> workflow_dispatch.
# - Pull request -> solo valida que el build y el smoke test pasan (no publica).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del sistema (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libxcb-cursor0 libgl1 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libfuse2

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Construir con PyInstaller
        run: pyinstaller --noconfirm --clean pdf2md.spec

      # ---- Smoke test headless del binario empaquetado ----
      - name: Smoke test headless (macOS)
        if: runner.os == 'macOS'
        run: |
          QT_QPA_PLATFORM=offscreen dist/pdf2md.app/Contents/MacOS/pdf2md &
          PID=$!
          sleep 8
          if kill -0 "$PID" 2>/dev/null; then
            echo "OK: el binario sigue vivo tras 8s (esperando UI)."
            kill "$PID" 2>/dev/null || true
          else
            echo "FALLO: el binario salió antes de tiempo."
            exit 1
          fi
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Smoke test headless (Linux)
        if: runner.os == 'Linux'
        run: |
          QT_QPA_PLATFORM=offscreen ./dist/pdf2md/pdf2md &
          PID=$!
          sleep 8
          if kill -0 "$PID" 2>/dev/null; then
            echo "OK: el binario sigue vivo tras 8s (esperando UI)."
            kill "$PID" 2>/dev/null || true
          else
            echo "FALLO: el binario salió antes de tiempo."
            exit 1
          fi
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Smoke test headless (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          $p = Start-Process -FilePath "dist\pdf2md\pdf2md.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($p.HasExited) {
            Write-Host "FALLO: el binario salió antes de tiempo (código $($p.ExitCode))."
            exit 1
          } else {
            Write-Host "OK: el binario sigue vivo tras 8s (esperando UI)."
            Stop-Process -Id $p.Id -Force
          }

      # ---- Empaquetado del artefacto por SO ----
      - name: Empaquetar artefacto (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/pdf2md.app pdf2md-macos.zip

      - name: Subir artefacto (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pdf2md-macos
          path: pdf2md-macos.zip
          if-no-files-found: error

      - name: Empaquetar artefacto (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\pdf2md -DestinationPath pdf2md-windows.zip -Force

      - name: Subir artefacto (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pdf2md-windows
          path: pdf2md-windows.zip
          if-no-files-found: error

      - name: Empaquetar artefacto Linux (AppImage con fallback a tar.gz)
        if: runner.os == 'Linux'
        run: |
          set -e
          APPDIR=AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/pdf2md/. "$APPDIR/usr/bin/"
          cp packaging/pdf2md.desktop "$APPDIR/pdf2md.desktop"
          cp assets/pdf2md.png "$APPDIR/pdf2md.png"
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/pdf2md" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          ok=0
          if wget -q -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"; then
            chmod +x appimagetool
            export APPIMAGE_EXTRACT_AND_RUN=1
            if ./appimagetool "$APPDIR" pdf2md-x86_64.AppImage; then
              ok=1
              echo "AppImage generado correctamente: pdf2md-x86_64.AppImage"
            fi
          fi

          if [ "$ok" -ne 1 ]; then
            echo "::warning::No se pudo generar el AppImage; usando fallback a .tar.gz"
            tar -czf pdf2md-linux.tar.gz -C dist pdf2md
            echo "Fallback generado: pdf2md-linux.tar.gz"
          fi

      - name: Subir artefacto (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: pdf2md-linux
          path: |
            pdf2md-x86_64.AppImage
            pdf2md-linux.tar.gz
          if-no-files-found: error

  # ---- Release: solo en tags v*, adjunta los 3 artefactos ----
  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/pdf2md-macos/*
            artifacts/pdf2md-windows/*
            artifacts/pdf2md-linux/*
